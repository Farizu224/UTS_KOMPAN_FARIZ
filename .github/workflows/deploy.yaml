name: Deploy Tinder App to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Masuk ke folder project
            cd ~/UTS_KOMPAN_FARIZ || git clone https://github.com/Farizu224/UTS_KOMPAN_FARIZ.git ~/UTS_KOMPAN_FARIZ
            cd ~/UTS_KOMPAN_FARIZ
            
            # Update code
            git pull origin main
            
            # Build image
            docker build -t tinder-app .
            
            # Hentikan container lama jika ada
            docker stop tinder-running || true
            docker rm tinder-running || true
            
            # Jalankan container baru dengan Environment Variables dari GitHub Secrets
            docker run -d \
              --name tinder-running \
              -p 80:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e RDS_HOST=${{ secrets.RDS_HOST }} \
              -e RDS_PORT=${{ secrets.RDS_PORT }} \
              -e RDS_USER=${{ secrets.RDS_USER }} \
              -e RDS_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              -e RDS_DATABASE=${{ secrets.RDS_DATABASE }} \
              -e RDS_USE_SSL=${{ secrets.RDS_USE_SSL }} \
              -e S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} \
              -e AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
              -e AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              tinder-app