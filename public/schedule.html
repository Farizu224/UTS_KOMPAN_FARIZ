<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadwal Angkut - Tinder (Trash Finder)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
      <div class="container">
        <a class="navbar-brand" href="/">Tinder (Trash Finder)</a>
        <div class="navbar-nav">
          <a class="nav-link" href="/report">Lapor Sampah</a>
          <a class="nav-link active" href="/schedule">Jadwal Angkut</a>
          <a class="nav-link" href="/admin">Admin Monitoring</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h4 mb-3">Jadwal Pengangkutan Sampah</h1>
          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead>
                <tr>
                  <th>Area</th>
                  <th>Hari</th>
                  <th>Jam</th>
                  <th>Catatan</th>
                </tr>
              </thead>
              <tbody id="schedule-body">
                <tr>
                  <td colspan="4" class="text-center text-muted">Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script>
      const scheduleBody = document.getElementById("schedule-body");

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function loadSchedule() {
        try {
          const response = await fetch("/api/schedule");
          if (!response.ok) {
            throw new Error("Gagal memuat data");
          }

          const schedules = await response.json();

          if (!Array.isArray(schedules) || schedules.length === 0) {
            scheduleBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Belum ada data jadwal.</td></tr>';
            return;
          }

          scheduleBody.innerHTML = schedules
            .map((item) => {
              const notes = item.notes ? item.notes : "-";
              return `
                <tr>
                  <td>${escapeHtml(item.area_name)}</td>
                  <td>${escapeHtml(item.day_of_week)}</td>
                  <td>${escapeHtml(item.pickup_time)}</td>
                  <td>${escapeHtml(notes)}</td>
                </tr>
              `;
            })
            .join("");
        } catch (_error) {
          scheduleBody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Gagal memuat jadwal.</td></tr>';
        }
      }

      loadSchedule();
    </script>
  </body>
</html>
