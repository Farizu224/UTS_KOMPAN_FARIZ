<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapor Sampah - Tinder (Trash Finder)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
      <div class="container">
        <a class="navbar-brand" href="/">Tinder (Trash Finder)</a>
        <div class="navbar-nav">
          <a class="nav-link active" href="/report">Lapor Sampah</a>
          <a class="nav-link" href="/schedule">Jadwal Angkut</a>
          <a class="nav-link" href="/admin">Admin Monitoring</a>
        </div>
      </div>
    </nav>

    <main class="container py-4" style="max-width: 720px;">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Form Pelaporan Sampah Ilegal</h1>

          <div id="alert-container"></div>

          <form action="/report" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
              <label for="location" class="form-label">Lokasi</label>
              <input type="text" class="form-control" id="location" name="location" placeholder="Contoh: Jl. Merdeka No. 10" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Titik Lokasi di Peta (opsional, disarankan)</label>
              <div id="report-map" style="height: 280px; border-radius: 0.5rem;"></div>
              <div class="form-text" id="coordinate-hint">Klik peta untuk memilih titik lokasi sampah.</div>
              <input type="hidden" id="latitude" name="latitude" />
              <input type="hidden" id="longitude" name="longitude" />
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Deskripsi</label>
              <textarea class="form-control" id="description" name="description" rows="4" placeholder="Jelaskan kondisi sampah ilegal" required></textarea>
            </div>

            <div class="mb-3">
              <label for="photo" class="form-label">Foto Bukti</label>
              <input class="form-control" type="file" id="photo" name="photo" accept="image/*" required />
            </div>

            <button type="submit" class="btn btn-success w-100">Kirim Laporan</button>
          </form>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      const params = new URLSearchParams(window.location.search);
      const success = params.get("success");
      const error = params.get("error");
      const alertContainer = document.getElementById("alert-container");
      const locationInput = document.getElementById("location");
      const latitudeInput = document.getElementById("latitude");
      const longitudeInput = document.getElementById("longitude");
      const coordinateHint = document.getElementById("coordinate-hint");

      const map = L.map("report-map").setView([-6.2, 106.816666], 11);
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(map);

      let marker;
      map.on("click", (event) => {
        const { lat, lng } = event.latlng;

        if (marker) {
          marker.setLatLng([lat, lng]);
        } else {
          marker = L.marker([lat, lng]).addTo(map);
        }

        const roundedLat = lat.toFixed(6);
        const roundedLng = lng.toFixed(6);

        latitudeInput.value = roundedLat;
        longitudeInput.value = roundedLng;
        coordinateHint.textContent = `Koordinat dipilih: ${roundedLat}, ${roundedLng}`;

        if (!locationInput.value.trim()) {
          locationInput.value = `Koordinat ${roundedLat}, ${roundedLng}`;
        }
      });

      if (success === "1") {
        alertContainer.innerHTML = '<div class="alert alert-success">Laporan berhasil dikirim.</div>';
      }

      if (error) {
        alertContainer.innerHTML = `<div class="alert alert-danger">${escapeHtml(error)}</div>`;
      }
    </script>
  </body>
</html>
